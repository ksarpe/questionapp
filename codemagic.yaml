# Codemagic CI — build iOS bez Maca i publikacja do TestFlight.
#
# Wymagana jednorazowa konfiguracja w UI Codemagic (szczegóły: IOS_RELEASE_CHECKLIST.md, sekcja 11):
#
# 1. codemagic.io → zaloguj przez GitHub → Add application → wybierz to repo → Flutter App.
# 2. Team settings (ikona zębatki przy teamie) → Integrations → Developer Portal →
#    dodaj klucz App Store Connect API (rola App Manager) i nazwij go DOKŁADNIE:
#    "AppStoreConnect" (nazwa musi zgadzać się z `integrations.app_store_connect` poniżej).
# 3. W aplikacji → Environment variables → utwórz grupę "debatly_secrets" i dodaj
#    (każdą jako Secure):
#      SUPABASE_URL              — https://….supabase.co
#      SUPABASE_ANON_KEY         — anon key z Supabase
#      REVENUECAT_API_KEY_IOS    — klucz appl_… (RevenueCat → apka App Store → Public API Key)
#      ADMOB_REWARDED_ID_IOS     — iOS-owy rewarded ad unit (ca-app-pub-…/…)
#      GOOGLE_SERVER_CLIENT_ID   — ten sam web client ID co na Androidzie
#      SENTRY_DSN                — DSN z Sentry
#    Opcjonalnie (czytelne, deobfuskowane stack trace w Sentry — patrz SENTRY_SETUP.md §5):
#      SENTRY_AUTH_TOKEN         — org auth token 'sntrys_…' (Sentry → Settings → Auth Tokens);
#                                  token organizacyjny sam wybiera region EU (.de). To JEDYNY
#                                  potrzebny tu sekret — org (akn-software) i project (debatly)
#                                  są zaszyte w bloku `sentry:` w pubspec.yaml.
#    Bez SENTRY_AUTH_TOKEN krok wgrywania symboli jest po prostu pomijany (build i tak przechodzi).
# 4. Start new build → workflow "ios-testflight".
#
# Numer builda (CFBundleVersion) bierze się z auto-inkrementującego licznika
# Codemagic ($BUILD_NUMBER) — każdy build dostaje unikalny, rosnący numer, więc
# nie trzeba go ręcznie podbijać w pubspec. Nazwa wersji
# (CFBundleShortVersionString) pochodzi z pubspec.yaml (pole `version:`, np. 1.0.1).

workflows:
  ios-testflight:
    name: iOS -> TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Automatyczne podpisywanie: Codemagic sam tworzy/pobiera certyfikat dystrybucyjny
      # i provisioning profile dla bundle ID przez App Store Connect API — zero Xcode.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aknsoftware.debatly
      groups:
        - debatly_secrets
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles
      - name: Patch Swift Package privacy manifests (ITMS-91064)
        script: |
          # This project integrates plugins via Swift Package Manager (no CocoaPods).
          # A bundled SDK ships a PrivacyInfo.xcprivacy that lists NSPrivacyTrackingDomains
          # while NSPrivacyTracking is not true, which Apple rejects (ITMS-91064).
          #
          # SPM lays packages out in two places under DerivedData/SourcePackages/:
          #   - checkouts/  : source packages (git)
          #   - artifacts/  : prebuilt BINARY xcframeworks (e.g. GoogleMobileAds) <- the
          #                   likely culprit; the previous scan wrongly looked only in
          #                   checkouts/ and missed these.
          # So: materialise the ephemeral iOS SPM package, resolve into the default
          # DerivedData that `flutter build ipa` reuses, then scan EVERY *.xcprivacy in
          # DerivedData + the build dir, log its state, and force NSPrivacyTracking=true
          # wherever tracking domains are declared (chmod first — xcframework files can be
          # read-only). FULLY NON-FATAL (set +e / exit 0): can never break the build; the
          # [privacy] log lines name any culprit + path for a precise follow-up.
          set +e
          flutter build ios --config-only --no-codesign >/dev/null 2>&1
          xcodebuild -resolvePackageDependencies \
            -workspace ios/Runner.xcworkspace -scheme Runner >/dev/null 2>&1
          echo "=== [privacy] scanning all Swift Package privacy manifests ==="
          find "$HOME/Library/Developer/Xcode/DerivedData" "$CM_BUILD_DIR" \
            -name '*.xcprivacy' 2>/dev/null | sort -u | while IFS= read -r f; do
            [ -z "$f" ] && continue
            dom=no
            /usr/bin/plutil -extract NSPrivacyTrackingDomains.0 raw "$f" >/dev/null 2>&1 && dom=yes
            trk=$(/usr/bin/plutil -extract NSPrivacyTracking raw "$f" 2>/dev/null)
            [ -z "$trk" ] && trk=absent
            echo "[privacy] domains=$dom tracking=$trk :: $f"
            if [ "$dom" = yes ] && [ "$trk" != "true" ]; then
              chmod u+w "$f" 2>/dev/null
              if /usr/bin/plutil -replace NSPrivacyTracking -bool true "$f" 2>/dev/null; then
                echo "[privacy]   >> ITMS-91064 FIX applied"
              else
                echo "[privacy]   >> WARNING could not patch: $f"
              fi
            fi
          done
          echo "=== [privacy] done ==="
          exit 0
      - name: Build IPA
        script: |
          # --obfuscate + --split-debug-info produce the Dart symbol maps that
          # the Sentry upload step below needs to de-obfuscate release traces.
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist \
            --obfuscate --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUECAT_API_KEY=$REVENUECAT_API_KEY_IOS \
            --dart-define=ADMOB_REWARDED_ID=$ADMOB_REWARDED_ID_IOS \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=$GOOGLE_SERVER_CLIENT_ID \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=SENTRY_ENVIRONMENT=production
      - name: Upload debug symbols to Sentry
        script: |
          # Skipped automatically until you add SENTRY_AUTH_TOKEN to debatly_secrets,
          # so a missing token never fails the build. org/project + all other options
          # come from the top-level `sentry:` block in pubspec.yaml.
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set — skipping Sentry symbol upload."
            exit 0
          fi
          dart run sentry_dart_plugin
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload do TestFlight po udanym buildzie; do App Store wysyłasz ręcznie
        # z App Store Connect, kiedy wersja jest gotowa.
        submit_to_testflight: true
      email:
        recipients:
          - kasper@aknsoftware.com
        notify:
          success: true
          failure: true
