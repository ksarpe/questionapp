# Static analysis configuration. `flutter analyze` reads this; CI runs it with
# --fatal-infos --fatal-warnings, so every rule below is enforced, not advisory.
#
# Base: the official Flutter lint set. The `linter.rules` block adds a curated
# stricter layer on top — chosen so the existing codebase already passes, and to
# keep it that way.
include: package:flutter_lints/flutter.yaml

# Riverpod-specific static analysis. riverpod_lint 3.1.x (the line compatible
# with flutter_riverpod 3.x) is a native analysis_server_plugin, not a
# custom_lint plugin, so it is enabled here via the top-level `plugins:` key
# rather than `dart run custom_lint`. The plugin is resolved by the analyzer
# itself — it is intentionally NOT a pubspec dev_dependency (that would drag
# analyzer ^12 into the app's own solve and clash with the rest of the toolchain).
# Surface its findings with `dart analyze`; note that `flutter analyze` does not
# yet relay analysis_server_plugin diagnostics on the current toolchain.
plugins:
  riverpod_lint:
    version: ^3.1.4
    # False positive on this codebase: the app DOES have a root ProviderScope
    # (lib/main.dart) — it sits one level under runApp's child, wrapped by the
    # transparent SentryWidget, which the rule's shallow heuristic can't see
    # past. Reordering to satisfy it would move SentryWidget below the scope and
    # change startup wiring, so we disable the rule instead. It only ever fires
    # at the single runApp root, so this is effectively scoped to that one site.
    # (Inline `// ignore:` doesn't suppress analysis_server_plugin diagnostics on
    # the current toolchain, so the suppression has to live here.)
    diagnostics:
      missing_provider_scope: false

analyzer:
  # Generated and build output should never gate analysis.
  exclude:
    - "lib/l10n/gen/**"
    - "build/**"
    - ".dart_tool/**"
  errors:
    # A dangling `// TODO` should nag in the IDE, not fail the build.
    todo: ignore

linter:
  rules:
    # --- Style consistency ---
    prefer_single_quotes: true
    directives_ordering: true
    prefer_relative_imports: true
    sort_child_properties_last: true
    unnecessary_parenthesis: true
    unnecessary_lambdas: true

    # --- Safety / correctness ---
    # NB: `avoid_redundant_argument_values` is deliberately NOT enabled — the
    # codebase states some defaults explicitly (e.g. `defaultValue: ''` in
    # AppConfig) for readability, and that is a conscious choice.
    always_declare_return_types: true
    prefer_const_declarations: true
    prefer_final_locals: true
    use_super_parameters: true
    unnecessary_await_in_return: true
