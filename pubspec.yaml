name: debatly
description: "A minimalist app that sparks conversation with one thought-provoking question at a time."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+3

environment:
  sdk: ^3.12.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  supabase_flutter: ^2.15.0
  purchases_flutter: ^10.2.3
  purchases_ui_flutter: ^10.2.3
  google_mobile_ads: ^9.0.0
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  url_launcher: ^6.3.2
  app_tracking_transparency: ^2.0.7
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  package_info_plus: ^10.1.0
  share_plus: ^13.1.0
  app_settings: ^7.0.0
  in_app_review: ^2.0.12
  # Detects online/offline transitions for the offline banner + auto-refresh on
  # reconnect. A hint only — a failed request is the authoritative offline signal
  # (see lib/core/network/network_error.dart).
  connectivity_plus: ^6.1.0
  sign_in_with_apple: ^8.1.0
  crypto: ^3.0.7
  # Crash + error reporting. Initialised in main() and centralised behind the
  # Monitoring facade (lib/core/monitoring/monitoring.dart); a no-op when no
  # SENTRY_DSN is provided, so dev/mock builds run untouched. See SENTRY_SETUP.md.
  sentry_flutter: 9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Pulled in directly (it is already a transitive dep of supabase) so tests may
  # import `package:http/testing.dart` MockClient without tripping the
  # depend_on_referenced_packages lint. Used to back a real SupabaseClient with a
  # mock HTTP transport in test/supabase_question_repository_test.dart, exercising
  # the production RPC↔model mapping with no live backend.
  http: ^1.6.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate the localizations (AppLocalizations) from the ARB files in lib/l10n
  # via `flutter gen-l10n`, configured by l10n.yaml. The ARB files are the single
  # source of truth for every user-facing string.
  generate: true

  # Brand art. `logo.png` is the in-app wordmark shown by SparkLogo (splash +
  # onboarding); `icon.png` is the source for the generated launcher icon. See
  # assets/images/README.md for the sizes and the two generate commands.
  assets:
    - assets/images/

  fonts:
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# ---------------------------------------------------------------------------
# Brand art generators (top-level keys, NOT under `flutter:`).
#
# These read assets/images/icon.png and assets/images/logo.png and regenerate
# the per-platform launcher icons and native splash, overwriting the defaults
# that `flutter create` shipped. Run after dropping the PNGs (or after changing
# them):
#   dart run flutter_launcher_icons
#   dart run flutter_native_splash:create
# ---------------------------------------------------------------------------

# App launcher icon (the icon on the phone home screen / app drawer).
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon.png"
  # Android adaptive icon. The foreground is the full orange square (icon.png),
  # so the background MUST be the same brand orange (#FF751F, sampled from the
  # icon corner) — otherwise the launcher's round/squircle mask shows the plate
  # colour around the square and the mark looks like it floats. Matching the
  # colour makes the whole icon a seamless edge-to-edge orange, like on iOS.
  adaptive_icon_background: "#FF751F"
  adaptive_icon_foreground: "assets/images/icon.png"

# Native splash (the frame shown before the Flutter engine draws). Matches the
# app's black canvas; SparkLogo takes over once Flutter is up.
flutter_native_splash:
  color: "#000000"
  image: assets/images/logo.png
  android_12:
    color: "#000000"
    image: assets/images/logo.png
