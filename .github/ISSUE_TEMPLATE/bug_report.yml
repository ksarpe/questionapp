name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Android, iOS, Both]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / build
      placeholder: "1.0.0+1"
  - type: textarea
    id: context
    attributes:
      label: Logs / screenshots
      description: Sentry event link, console output, or screenshots if available.
